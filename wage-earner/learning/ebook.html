            '1': [
                { title: 'Python 快速入门指南', pages: '120 页', size: '5.2 MB', chapters: [
                    { title: '第一章：Python 简介', content: '<h1>第一章：Python 简介</h1><h2>1.1 什么是 Python？</h2><p>Python 是一种高级编程语言，由 Guido van Rossum 于 1991 年创建。它以其简洁的语法和强大的功能而闻名，是目前最受欢迎的编程语言之一。</p><p>Python 的设计哲学强调代码的可读性和简洁性，它的语法允许程序员用更少的代码行表达概念，相比 C++ 或 Java 等语言，Python 代码通常更短。</p><h3>Python 的主要特点</h3><ul><li><strong>简洁易读：</strong>Python 语法简洁，代码可读性强，接近自然语言</li><li><strong>跨平台：</strong>支持 Windows、Mac、Linux 等操作系统</li><li><strong>丰富的库：</strong>拥有庞大的标准库和第三方库，涵盖各个领域</li><li><strong>开源免费：</strong>完全免费，社区活跃，有大量的学习资源</li><li><strong>应用广泛：</strong>Web 开发、数据分析、人工智能、自动化办公等</li></ul><div class="tip"><strong>💡 小贴士：</strong>Python 的名字来源于英国喜剧团体"蒙提·派森的飞行马戏团"（Monty Python\'s Flying Circus），而不是蟒蛇。Guido 是该喜剧团体的粉丝。</div><h2>1.2 Python 的应用领域</h2><h3>Web 开发</h3><p>使用 Django、Flask、FastAPI 等框架可以快速构建 Web 应用。许多知名网站如 Instagram、Pinterest 都是用 Python 开发的。</p><h3>数据分析</h3><p>Pandas、NumPy、Matplotlib 等库使 Python 成为数据分析的首选工具。数据科学家和分析师广泛使用 Python 进行数据处理和可视化。</p><h3>人工智能</h3><p>TensorFlow、PyTorch、Scikit-learn 等机器学习库让 Python 成为 AI 领域的主流语言。深度学习、自然语言处理、计算机视觉等领域都大量使用 Python。</p><h3>自动化办公</h3><p>Python 可以自动处理 Excel、Word、PDF 等文件，自动化日常办公任务，大大提高工作效率。</p><h3>网络爬虫</h3><p>使用 Scrapy、BeautifulSoup 等库可以编写网络爬虫，从网站获取数据。</p>' },
                    { title: '第二章：环境配置', content: '<h1>第二章：环境配置</h1><h2>2.1 安装 Python</h2><p>首先需要从 Python 官网（python.org）下载最新版本的 Python。目前推荐使用 Python 3.10 或更高版本。</p><h3>Windows 安装</h3><p>1. 下载安装包并运行</p><p>2. <strong>重要：</strong>勾选"Add Python to PATH"选项，这样可以在命令行中直接使用 Python</p><p>3. 点击"Install Now"开始安装</p><p>4. 安装完成后，打开命令提示符，输入<code>python --version</code>验证安装</p><h3>Mac 安装</h3><p>Mac 系统通常预装了 Python，但建议使用 Homebrew 安装最新版本：</p><div class="code">brew install python</div><h3>Linux 安装</h3><div class="code">sudo apt update\nsudo apt install python3 python3-pip</div><h2>2.2 选择编辑器</h2><h3>VS Code（推荐）</h3><p>Visual Studio Code 是微软开发的免费代码编辑器，轻量且功能强大。</p><ul><li>安装 Python 扩展</li><li>支持代码高亮、自动补全</li><li>内置调试器</li><li>丰富的插件生态</li></ul><h3>PyCharm</h3><p>JetBrains 开发的专业 Python IDE，分为社区版（免费）和专业版（付费）。</p><ul><li>功能全面的 Python 开发环境</li><li>智能代码补全</li><li>强大的调试功能</li><li>集成版本控制</li></ul><h3>Jupyter Notebook</h3><p>适合数据分析和学习的交互式环境。</p><ul><li>可以边写代码边看结果</li><li>支持 Markdown 笔记</li><li>数据科学领域标准工具</li></ul><h2>2.3 第一个 Python 程序</h2><p>打开编辑器，创建第一个 Python 文件<code>hello.py</code>：</p><div class="code"># 这是你的第一个 Python 程序\nprint("Hello, World!")\nprint("欢迎来到 Python 世界！")\n\n# 简单的计算\na = 10\nb = 20\nprint(f"{a} + {b} = {a + b}")</div><p>运行程序：</p><div class="code">python hello.py</div><div class="tip"><strong>💡 小贴士：</strong><code>print()</code> 函数用于输出内容到屏幕，是 Python 中最常用的函数之一。</div>' },
                    { title: '第三章：基础语法', content: '<h1>第三章：基础语法</h1><h2>3.1 变量与数据类型</h2><p>变量是存储数据的容器。在 Python 中，不需要声明变量类型，可以直接赋值。</p><div class="code"># 字符串\nname = "Python"\nmessage = \'Hello\'\n\n# 整数\nage = 30\ncount = 100\n\n# 浮点数\nprice = 19.99\npi = 3.14159\n\n# 布尔值\nis_active = True\nis_finished = False\n\n# 查看类型\nprint(type(name))  # &lt;class \'str\'&gt;\nprint(type(age))   # &lt;class \'int\'&gt;</div><h2>3.2 运算符</h2><h3>算术运算符</h3><div class="code">a = 10\nb = 3\n\nprint(a + b)  # 加法：13\nprint(a - b)  # 减法：7\nprint(a * b)  # 乘法：30\nprint(a / b)  # 除法：3.333...\nprint(a % b)  # 取余：1\nprint(a ** b) # 幂运算：1000\nprint(a // b) # 整除：3</div><h3>比较运算符</h3><div class="code">print(10 == 10)  # True\nprint(10 != 5)   # True\nprint(10 > 5)    # True\nprint(10 &lt; 5)    # False\nprint(10 &gt;= 10)   # True\nprint(10 &lt;= 5)    # False</div><h3>逻辑运算符</h3><div class="code">print(True and False)  # False\nprint(True or False)   # True\nprint(not True)        # False</div><h2>3.3 字符串操作</h2><div class="code">text = "Hello, Python!"\n\n# 字符串长度\nprint(len(text))  # 14\n\n# 字符串切片\nprint(text[0:5])   # Hello\nprint(text[7:])    # Python!\n\n# 字符串方法\nprint(text.lower())  # hello, python!\nprint(text.upper())  # HELLO, PYTHON!\nprint(text.replace("Python", "World"))  # Hello, World!</div><div class="warning"><strong>⚠️ 注意：</strong>Python 是大小写敏感的语言，<code>Variable</code>和<code>variable</code>是两个不同的变量。</div>' },
                    { title: '第四章：数据结构', content: '<h1>第四章：数据结构</h1><h2>4.1 列表 List</h2><p>列表是 Python 中最常用的数据结构，用于存储有序的元素集合。</p><div class="code"># 创建列表\nfruits = ["apple", "banana", "orange"]\nnumbers = [1, 2, 3, 4, 5]\nmixed = [1, "hello", 3.14, True]\n\n# 访问元素\nprint(fruits[0])     # apple\nprint(fruits[-1])    # orange（最后一个）\n\n# 添加元素\nfruits.append("grape")      # 添加到末尾\nfruits.insert(1, "pear")    # 插入到指定位置\n\n# 删除元素\nfruits.remove("banana")     # 删除指定值\ndel fruits[0]               # 删除指定位置\n\n# 列表切片\nprint(fruits[1:3])  # 获取子列表\n\n# 列表推导式\nsquares = [x**2 for x in range(10)]\nprint(squares)  # [0, 1, 4, 9, 16, 25, 36, 49, 64, 81]</div><h2>4.2 字典 Dict</h2><p>字典是键值对的集合，用于存储映射关系。</p><div class="code"># 创建字典\nperson = {\n    "name": "张三",\n    "age": 25,\n    "city": "北京"\n}\n\n# 访问值\nprint(person["name"])  # 张三\nprint(person.get("age"))  # 25\n\n# 添加/修改\nperson["email"] = "zhangsan@example.com"\nperson["age"] = 26\n\n# 删除\ndel person["city"]\n\n# 遍历\nfor key, value in person.items():\n    print(f"{key}: {value}")</div><h2>4.3 元组和集合</h2><div class="code"># 元组（不可变列表）\ncoordinates = (10, 20)\nprint(coordinates[0])  # 10\n\n# 集合（无序不重复）\nunique_numbers = {1, 2, 3, 3, 4}\nprint(unique_numbers)  # {1, 2, 3, 4}</div><div class="tip"><strong>💡 小贴士：</strong>列表适用于需要修改的场景，元组适用于不需要修改的场景，字典适用于需要键值映射的场景。</div>' },
                    { title: '第五章：函数与模块', content: '<h1>第五章：函数与模块</h1><h2>5.1 函数定义</h2><p>函数是组织好的、可重复使用的代码块。</p><div class="code"># 定义函数\ndef greet(name):\n    """问候函数"""\n    return f"Hello, {name}!"\n\n# 调用函数\nmessage = greet("Python")\nprint(message)  # Hello, Python!\n\n# 带默认参数的函数\ndef introduce(name, age=18):\n    print(f"我叫{name}，今年{age}岁")\n\nintroduce("张三")      # 我叫张三，今年 18 岁\nintroduce("李四", 25)  # 我叫李四，今年 25 岁\n\n# 可变参数\ndef sum_all(*args):\n    return sum(args)\n\nprint(sum_all(1, 2, 3, 4))  # 10</div><h2>5.2 Lambda 表达式</h2><div class="code"># 匿名函数\nsquare = lambda x: x ** 2\nprint(square(5))  # 25\n\n# 配合 map 使用\nnumbers = [1, 2, 3, 4]\nsquared = list(map(lambda x: x**2, numbers))\nprint(squared)  # [1, 4, 9, 16]</div><h2>5.3 模块导入</h2><div class="code"># 导入整个模块\nimport math\nprint(math.sqrt(16))  # 4.0\n\n# 导入特定函数\nfrom datetime import datetime\nprint(datetime.now())\n\n# 导入并重命名\nimport numpy as np\n\n# 导入所有\nfrom math import *</div><h2>5.4 常用内置模块</h2><ul><li><code>os</code> - 操作系统接口</li><li><code>sys</code> - 系统相关功能</li><li><code>datetime</code> - 日期时间处理</li><li><code>json</code> - JSON 数据处理</li><li><code>random</code> - 随机数生成</li></ul><div class="tip"><strong>💡 小贴士：</strong>使用<code>pip install 包名</code>可以安装第三方库，如<code>pip install requests</code>。</div>' },
                    { title: '第六章：实战练习', content: '<h1>第六章：实战练习</h1><h2>6.1 项目一：计算器</h2><p>实现一个简单的命令行计算器。</p><div class="code">def calculator():\n    print("=== 简单计算器 ===")\n    \n    num1 = float(input("输入第一个数字："))\n    operator = input("输入运算符 (+, -, *, /)：")\n    num2 = float(input("输入第二个数字："))\n    \n    if operator == "+":\n        result = num1 + num2\n    elif operator == "-":\n        result = num1 - num2\n    elif operator == "*":\n        result = num1 * num2\n    elif operator == "/":\n        result = num1 / num2\n    else:\n        print("无效的运算符")\n        return\n    \n    print(f"结果：{result}")\n\ncalculator()</div><h2>6.2 项目二：待办事项</h2><p>实现一个简单的待办事项管理系统。</p><div class="code">todos = []\n\nwhile True:\n    print("\\n=== 待办事项 ===")\n    print("1. 添加事项")\n    print("2. 查看事项")\n    print("3. 删除事项")\n    print("4. 退出")\n    \n    choice = input("选择操作：")\n    \n    if choice == "1":\n        todo = input("输入事项：")\n        todos.append(todo)\n        print("已添加！")\n    elif choice == "2":\n        for i, todo in enumerate(todos, 1):\n            print(f"{i}. {todo}")\n    elif choice == "3":\n        index = int(input("输入序号："))\n        todos.pop(index - 1)\n        print("已删除！")\n    elif choice == "4":\n        break</div><h2>6.3 项目三：数据分析</h2><p>使用 Pandas 进行简单的数据分析。</p><div class="code">import pandas as pd\n\n# 创建数据\ndata = {\n    "姓名": ["张三", "李四", "王五"],\n    "年龄": [25, 30, 35],\n    "工资": [8000, 10000, 12000]\n}\n\ndf = pd.DataFrame(data)\n\n# 查看数据\nprint(df)\nprint(df["工资"].mean())  # 平均工资</div><div class="tip"><strong>🎉 恭喜！</strong>你已经完成了 Python 入门学习。继续练习，编写更多项目来提升技能！</div>' }
                ]},
                { title: 'Python 数据结构详解', pages: '180 页', size: '8.5 MB', chapters: [
                    { title: '第一章：列表进阶', content: '<h1>第一章：列表进阶</h1><h2>1.1 列表推导式</h2><p>列表推导式是一种简洁的创建列表的方法。</p><div class="code"># 基本语法\nsquares = [x**2 for x in range(10)]\nprint(squares)  # [0, 1, 4, 9, 16, 25, 36, 49, 64, 81]\n\n# 带条件\neven_squares = [x**2 for x in range(10) if x % 2 == 0]\nprint(even_squares)  # [0, 4, 16, 36, 64]\n\n# 嵌套循环\nmatrix = [[i*j for j in range(3)] for i in range(3)]\nprint(matrix)  # [[0, 0, 0], [0, 1, 2], [0, 2, 4]]</div><h2>1.2 列表常用方法</h2><div class="code">fruits = ["apple", "banana", "orange"]\n\n# 添加\nfruits.append("grape")      # 末尾添加\nfruits.extend(["pear", " peach"])  # 扩展列表\nfruits.insert(0, "first")   # 插入\n\n# 删除\nfruits.remove("banana")     # 删除值\nlast = fruits.pop()         # 弹出最后一个\n\n# 其他\nfruits.sort()               # 排序\nfruits.reverse()            # 反转\nindex = fruits.index("apple")  # 查找索引\ncount = fruits.count("apple")  # 计数</div>' },
                    { title: '第二章：字典应用', content: '<h1>第二章：字典应用</h1><h2>2.1 字典推导式</h2><div class="code"># 基本语法\nsquares = {x: x**2 for x in range(5)}\nprint(squares)  # {0: 0, 1: 1, 2: 4, 3: 9, 4: 16}\n\n# 带条件\neven_squares = {x: x**2 for x in range(10) if x % 2 == 0}\nprint(even_squares)  # {0: 0, 2: 4, 4: 16, 6: 36, 8: 64}</div><h2>2.2 字典常用操作</h2><div class="code">person = {"name": "张三", "age": 25}\n\n# 安全获取\nname = person.get("name", "未知")\n\n# 合并字典\nperson.update({"city": "北京"})\n\n# 遍历\nfor key, value in person.items():\n    print(f"{key}: {value}")</div>' },
                    { title: '第三章：集合操作', content: '<h1>第三章：集合操作</h1><h2>3.1 集合运算</h2><div class="code">set1 = {1, 2, 3, 4, 5}\nset2 = {4, 5, 6, 7, 8}\n\n# 并集\nprint(set1 | set2)  # {1, 2, 3, 4, 5, 6, 7, 8}\n\n# 交集\nprint(set1 & set2)  # {4, 5}\n\n# 差集\nprint(set1 - set2)  # {1, 2, 3}\n\n# 对称差集\nprint(set1 ^ set2)  # {1, 2, 3, 6, 7, 8}</div>' },
                    { title: '第四章：元组与命名元组', content: '<h1>第四章：元组与命名元组</h1><h2>4.1 命名元组</h2><div class="code">from collections import namedtuple\n\n# 定义命名元组\nPerson = namedtuple("Person", ["name", "age", "city"])\n\n# 创建实例\np = Person("张三", 25, "北京")\n\n# 访问\nprint(p.name)  # 张三\nprint(p.age)   # 25</div>' },
                    { title: '第五章：数据结构选择', content: '<h1>第五章：数据结构选择</h1><h2>5.1 性能对比</h2><ul><li><strong>列表：</strong>适合有序数据，支持索引访问</li><li><strong>字典：</strong>适合键值映射，查找速度快</li><li><strong>集合：</strong>适合去重和集合运算</li><li><strong>元组：</strong>适合不可变数据，性能略好</li></ul>' },
                    { title: '第六章：实战案例', content: '<h1>第六章：实战案例</h1><h2>6.1 综合应用</h2><p>结合多种数据结构解决实际问题。</p><div class="code"># 统计词频\ntext = "python is great python is fun"\nwords = text.split()\n\nfrom collections import Counter\nword_count = Counter(words)\nprint(word_count)  # Counter({\'python\': 2, \'is\': 2, ...})</div>' }

        let currentCourse = '1';
        let currentEbook = 0;
        let currentPage = 0;
        
        function loadEbook() {
            const params = new URLSearchParams(window.location.search);
            currentCourse = params.get('id') || '1';
            currentEbook = parseInt(params.get('ebook') || '0');
            
            const ebooks = allEbooks[currentCourse];
            if (!ebooks || !ebooks[currentEbook]) {
                document.querySelector('.ebook-reader').innerHTML = '<div style="padding:50px;text-align:center;"><h1>电子书不存在</h1><a href="/learning/" style="color:#11998e;">返回课程列表</a></div>';
                return;
            }
            
            const ebook = ebooks[currentEbook];
            document.getElementById('ebookTitle').textContent = ebook.title;
            document.getElementById('ebookMeta').textContent = ebook.pages + ' | ' + ebook.size + ' | 2026 年版';
            
            // 生成目录
            document.getElementById('tocList').innerHTML = ebook.chapters.map((chapter, i) => 
                '<li><a onclick="goToPage(' + i + ')">' + chapter.title + '</a></li>'
            ).join('');
            
            currentPage = 0;
            renderPage();
        }
        
        function renderPage() {
            const ebooks = allEbooks[currentCourse];
            if (!ebooks || !ebooks[currentEbook]) return;
            
            const ebook = ebooks[currentEbook];
            const chapter = ebook.chapters[currentPage];
            
            document.getElementById('ebookContent').innerHTML = chapter.content;
            document.getElementById('pageInfo').textContent = '第 ' + (currentPage + 1) + ' / ' + ebook.chapters.length + ' 章';
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === ebook.chapters.length - 1;
            
            const contentEl = document.querySelector('.ebook-content');
            if (contentEl) {
                contentEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        
        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        }
        
        function nextPage() {
            const ebooks = allEbooks[currentCourse];
            if (!ebooks || !ebooks[currentEbook]) return;
            
            const ebook = ebooks[currentEbook];
            if (currentPage < ebook.chapters.length - 1) {
                currentPage++;
                renderPage();
            }
        }
        
        function goToPage(index) {
            currentPage = index;
            renderPage();
        }
        
        loadEbook();
    </script>
</body>
</html>
