                        { title: '第二章：发展心理学', content: '<h1>第二章：发展心理学</h1><p>人类心理发展过程。</p>' },
                        { title: '第三章：社会心理学', content: '<h1>第三章：社会心理学</h1><p>社会心理学基础。</p>' },
                        { title: '第四章：人格心理学', content: '<h1>第四章：人格心理学</h1><p>人格理论和测评。</p>' },
                        { title: '第五章：变态心理学', content: '<h1>第五章：变态心理学</h1><p>心理障碍分类。</p>' },
                        { title: '第六章：心理咨询', content: '<h1>第六章：心理咨询</h1><p>心理咨询基础。</p>' }
                    ]},
                    { title: '心理咨询技巧手册', pages: '200 页', size: '11.2 MB', chapters: [
                        { title: '第一章：建立关系', content: '<h1>第一章：建立关系</h1><p>与来访者建立信任关系。</p>' },
                        { title: '第二章：倾听技巧', content: '<h1>第二章：倾听技巧</h1><p>专业倾听技巧。</p>' },
                        { title: '第三章：提问技巧', content: '<h1>第三章：提问技巧</h1><p>有效提问方法。</p>' },
                        { title: '第四章：反馈技巧', content: '<h1>第四章：反馈技巧</h1><p>给予反馈的技巧。</p>' },
                        { title: '第五章：面质技巧', content: '<h1>第五章：面质技巧</h1><p>面质的使用方法。</p>' },
                        { title: '第六章：案例实践', content: '<h1>第六章：案例实践</h1><p>咨询案例实践。</p>' }
                    ]}
                ]
            };
        };
        
        let currentCourse = 1;
        let currentEbook = 0;
        let currentPage = 0;
        
        function loadEbook() {
            const params = new URLSearchParams(window.location.search);
            currentCourse = parseInt(params.get('id') || '1');
            currentEbook = parseInt(params.get('ebook') || '0');
            
            const ebooks = allEbooks[currentCourse];
            if (!ebooks || !ebooks[currentEbook]) {
                document.querySelector('.ebook-reader').innerHTML = '<div style="padding:50px;text-align:center;"><h1>电子书不存在</h1><a href="/learning/" style="color:#11998e;">返回课程列表</a></div>';
                return;
            }
            
            const ebook = ebooks[currentEbook];
            document.getElementById('ebookTitle').textContent = ebook.title;
            document.querySelector('.ebook-meta').textContent = `${ebook.pages} | ${ebook.size} | 2026 年版`;
            
            // 生成目录
            document.getElementById('tocList').innerHTML = ebook.chapters.map((chapter, i) => 
                `<li><a onclick="goToPage(${i})">${chapter.title}</a></li>`
            ).join('');
            
            currentPage = 0;
            renderPage();
        }
        
        function renderPage() {
            const ebooks = allEbooks[currentCourse];
            const ebook = ebooks[currentEbook];
            const chapter = ebook.chapters[currentPage];
            
            document.getElementById('ebookContent').innerHTML = chapter.content;
            document.getElementById('pageInfo').textContent = `第 ${currentPage + 1} / ${ebook.chapters.length} 章`;
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === ebook.chapters.length - 1;
            window.scrollTo(0, document.querySelector('.ebook-content').offsetTop - 100);
        }
        
        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        }
        
        function nextPage() {
            const ebooks = allEbooks[currentCourse];
            const ebook = ebooks[currentEbook];
            if (currentPage < ebook.chapters.length - 1) {
                currentPage++;
                renderPage();
            }
        }
        
        function goToPage(index) {
            currentPage = index;
            renderPage();
        }
        
        loadEbook();
    </script>
</body>
</html>
