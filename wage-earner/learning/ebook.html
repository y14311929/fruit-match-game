        let currentCourse = '1';
        let currentEbook = 0;
        let currentPage = 0;
        
        function loadEbook() {
            const params = new URLSearchParams(window.location.search);
            currentCourse = params.get('id') || '1';
            currentEbook = parseInt(params.get('ebook') || '0');
            
            console.log('Loading ebook:', currentCourse, currentEbook);
            
            const ebooks = allEbooks[currentCourse];
            if (!ebooks || !ebooks[currentEbook]) {
                document.querySelector('.ebook-reader').innerHTML = '<div style="padding:50px;text-align:center;"><h1>电子书不存在</h1><p>课程 ID: ' + currentCourse + ', 电子书 ID: ' + currentEbook + '</p><a href="/learning/" style="color:#11998e;">返回课程列表</a></div>';
                return;
            }
            
            const ebook = ebooks[currentEbook];
            document.getElementById('ebookTitle').textContent = ebook.title;
            document.getElementById('ebookMeta').textContent = ebook.pages + ' | ' + ebook.size + ' | 2026 年版';
            
            // 生成目录
            document.getElementById('tocList').innerHTML = ebook.chapters.map((chapter, i) => 
                '<li><a onclick="goToPage(' + i + ')">' + chapter.title + '</a></li>'
            ).join('');
            
            currentPage = 0;
            renderPage();
        }
        
        function renderPage() {
            const ebooks = allEbooks[currentCourse];
            if (!ebooks || !ebooks[currentEbook]) return;
            
            const ebook = ebooks[currentEbook];
            const chapter = ebook.chapters[currentPage];
            
            document.getElementById('ebookContent').innerHTML = chapter.content;
            document.getElementById('pageInfo').textContent = '第 ' + (currentPage + 1) + ' / ' + ebook.chapters.length + ' 章';
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === ebook.chapters.length - 1;
            
            // 滚动到内容顶部
            const contentEl = document.querySelector('.ebook-content');
            if (contentEl) {
                contentEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        
        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        }
        
        function nextPage() {
            const ebooks = allEbooks[currentCourse];
            if (!ebooks || !ebooks[currentEbook]) return;
            
            const ebook = ebooks[currentEbook];
            if (currentPage < ebook.chapters.length - 1) {
                currentPage++;
                renderPage();
            }
        }
        
        function goToPage(index) {
            currentPage = index;
            renderPage();
        }
        
        // 页面加载时初始化
        loadEbook();
    </script>
