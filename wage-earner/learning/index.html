<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习提升 - 打工人之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .back-link { display: inline-block; color: white; text-decoration: none; margin-bottom: 20px; font-size: 1.1em; }
        h1 { color: white; font-size: 2.5em; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: white; opacity: 0.9; margin-bottom: 40px; font-size: 1.2em; }
        .category-tabs { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .tab { padding: 12px 30px; background: rgba(255,255,255,0.2); border: none; border-radius: 25px; color: white; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: white; color: #667eea; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .course-card { background: rgba(255,255,255,0.95); border-radius: 15px; overflow: hidden; transition: all 0.3s; cursor: pointer; }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .course-cover { height: 180px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 5em; }
        .course-body { padding: 25px; }
        .course-category { display: inline-block; padding: 5px 15px; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; border-radius: 20px; font-size: 0.85em; font-weight: bold; margin-bottom: 15px; }
        .course-title { font-size: 1.3em; font-weight: bold; color: #333; margin-bottom: 10px; }
        .course-desc { color: #666; line-height: 1.6; margin-bottom: 15px; font-size: 0.95em; }
        .course-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #e0e0e0; color: #999; font-size: 0.9em; }
        .course-stats { display: flex; gap: 15px; }
        .stat { display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回首页</a>
        <h1>📚 学习提升</h1>
        <p class="subtitle">投资自己，是最好的投资</p>
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="course-grid" id="courseGrid"></div>
    </div>
    <script>
        const categories = [
            { id: 'all', name: '全部课程' },
            { id: 'tech', name: '💻 技术技能' },
            { id: 'design', name: '🎨 设计创意' },
            { id: 'business', name: '💼 商业管理' },
            { id: 'language', name: '🗣️ 语言学习' },
            { id: 'soft', name: '🤝 软技能' },
            { id: 'cert', name: '📜 证书考试' }
        ];
        const courses = [
            { id: 1, category: 'tech', title: 'Python 编程从入门到精通', desc: '适合零基础，30 天掌握 Python 核心技能，自动化办公、数据分析都能搞定！', icon: '🐍', students: '12.5w', rating: 4.9, duration: '60 课时' },
            { id: 2, category: 'tech', title: '前端开发实战训练营', desc: 'HTML+CSS+JavaScript+Vue，完成 10 个真实项目，毕业就能上岗！', icon: '🌐', students: '8.3w', rating: 4.8, duration: '90 课时' },
            { id: 3, category: 'tech', title: '数据分析大师课', desc: 'Excel+SQL+Python+Tableau，成为企业抢手的数据分析人才！', icon: '📊', students: '6.7w', rating: 4.9, duration: '80 课时' },
            { id: 4, category: 'design', title: 'UI/UX 设计全栈课程', desc: '从零基础到接单，掌握 Figma、Sketch，做出让人惊艳的设计！', icon: '🎨', students: '5.2w', rating: 4.7, duration: '70 课时' },
            { id: 5, category: 'design', title: '短视频剪辑实战', desc: 'Pr+ 剪映，学会爆款视频制作，副业接单月入过万！', icon: '🎬', students: '15.8w', rating: 4.8, duration: '40 课时' },
            { id: 6, category: 'business', title: '项目管理 PMP 认证', desc: '系统学习项目管理，拿下 PMP 证书，升职加薪不是梦！', icon: '📋', students: '3.5w', rating: 4.9, duration: '50 课时' },
            { id: 7, category: 'business', title: '新媒体运营实战', desc: '公众号、小红书、抖音全平台运营，从 0 到 1 打造爆款！', icon: '📱', students: '9.2w', rating: 4.7, duration: '45 课时' },
            { id: 8, category: 'language', title: '商务英语进阶', desc: '职场英语、邮件写作、会议口语，外企面试轻松应对！', icon: '🗣️', students: '7.8w', rating: 4.8, duration: '60 课时' },
            { id: 9, category: 'language', title: '日语从入门到 N1', desc: '系统学习日语，通关 N1，日企就业/留学必备！', icon: '🇯🇵', students: '4.3w', rating: 4.9, duration: '120 课时' },
            { id: 10, category: 'soft', title: '高效沟通技巧', desc: '学会向上管理、跨部门协作，成为职场沟通高手！', icon: '💬', students: '11.2w', rating: 4.8, duration: '30 课时' },
            { id: 11, category: 'soft', title: '时间管理与效率提升', desc: '告别拖延症，掌握番茄工作法，效率翻倍准时下班！', icon: '⏰', students: '13.5w', rating: 4.9, duration: '25 课时' },
            { id: 12, category: 'soft', title: '职场演讲与表达', desc: '克服紧张，逻辑清晰，让你的每次发言都闪闪发光！', icon: '🎤', students: '6.8w', rating: 4.7, duration: '35 课时' },
            { id: 13, category: 'cert', title: '人力资源管理师', desc: '系统学习 HR 知识，考取国家认证，转行 HR 必备！', icon: '👥', students: '4.5w', rating: 4.8, duration: '80 课时' },
            { id: 14, category: 'cert', title: '心理咨询师认证', desc: '学习心理学知识，帮助他人也治愈自己，副业首选！', icon: '🧠', students: '8.9w', rating: 4.9, duration: '100 课时' },
            { id: 15, category: 'tech', title: 'AI 大模型应用开发', desc: '掌握 ChatGPT API、LangChain，成为 AI 时代稀缺人才！', icon: '🤖', students: '5.6w', rating: 4.9, duration: '50 课时' }
        ];
        let currentCategory = 'all';
        function renderTabs() {
            document.getElementById('categoryTabs').innerHTML = categories.map(cat => 
                `<button class="tab ${cat.id === currentCategory ? 'active' : ''}" onclick="filterCategory('${cat.id}')">${cat.name}</button>`
            ).join('');
        }
        function filterCategory(catId) {
            currentCategory = catId;
            renderTabs();
            renderCourses();
        }
        function renderCourses() {
            const grid = document.getElementById('courseGrid');
            const filtered = currentCategory === 'all' ? courses : courses.filter(c => c.category === currentCategory);
            grid.innerHTML = filtered.map(course => `
                <div class="course-card">
                    <div class="course-cover">${course.icon}</div>
                    <div class="course-body">
                        <span class="course-category">${categories.find(c => c.id === course.category)?.name}</span>
                        <h3 class="course-title">${course.title}</h3>
                        <p class="course-desc">${course.desc}</p>
                        <div class="course-meta">
                            <div class="course-stats">
                                <span class="stat">👥 ${course.students}</span>
                                <span class="stat">⭐ ${course.rating}</span>
                                <span class="stat">🕐 ${course.duration}</span>
                            </div>
                            <span style="color: #667eea; font-weight: 600;">立即学习 →</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        renderTabs();
        renderCourses();
    </script>
</body>
</html>
