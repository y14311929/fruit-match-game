            if (!course) { document.body.innerHTML = '<div style="text-align:center;padding:100px;"><h1>课程不存在</h1><a href="/learning/" style="color:#11998e;">返回课程列表</a></div>'; return; }

            document.getElementById('courseBadge').textContent = course.badge;
            document.getElementById('courseTitle').textContent = course.title;
            document.getElementById('courseStudents').textContent = course.students;
            document.getElementById('courseRating').textContent = course.rating;
            document.getElementById('courseCategory').textContent = course.category;
            document.getElementById('courseDesc').textContent = course.desc;
            document.getElementById('syllabus').innerHTML = course.syllabus.map((chapter, i) => `<div class="syllabus-item"><div class="syllabus-header"><span class="syllabus-title">${chapter.chapter}</span><span class="syllabus-count">${chapter.count}</span></div><ul class="syllabus-list">${chapter.lessons.map((lesson, j) => `<li><span>${lesson}</span><a href="/learning/video.html?id=${id}&video=${i*5+j}" style="color:#11998e;text-decoration:none;font-weight:600;">▶️ 观看</a></li>`).join('')}</ul></div>`).join('');
            document.getElementById('videos').innerHTML = course.videos.map((video, i) => `<div class="video-item"><div class="video-thumbnail" onclick="location.href='/learning/video.html?id=${id}&video=${i}'" style="cursor:pointer;">${video.icon}</div><div class="video-info"><h4 class="video-title"><a href="/learning/video.html?id=${id}&video=${i}" style="color:#333;text-decoration:none;">${video.title}</a></h4><div class="video-meta"><span>⏱️ ${video.duration}</span><span>👁️ ${video.views}次观看</span></div></div></div>`).join('');
            document.getElementById('ebooks').innerHTML = course.ebooks.map((ebook, i) => `<div class="ebook-item"><span class="ebook-icon">${ebook.icon}</span><div class="ebook-info"><h4 class="ebook-title"><a href="/learning/ebook.html?id=${id}&ebook=${i}" style="color:#333;text-decoration:none;">${ebook.title}</a></h4><div class="ebook-meta">📄 ${ebook.pages} | 💾 ${ebook.size}</div></div><a href="/learning/ebook.html?id=${id}&ebook=${i}" class="download-btn" style="text-decoration:none;">阅读</a></div>`).join('');
            const relatedGrid = document.getElementById('relatedGrid');
            relatedGrid.innerHTML = course.related.map(relId => { const rel = courseList.find(c => c.id === relId); return `<div class="related-card" onclick="location.href='/learning/detail.html?id=${relId}'"><img src="${rel.image}" alt="${rel.title}" class="related-image"><div class="related-body"><h4 class="related-title">${rel.title}</h4><div class="related-meta">${rel.students} · ${rel.rating}</div></div></div>`; }).join('');
        }
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
        loadCourse();
    </script>
</body>
</html>
