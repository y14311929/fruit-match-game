<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区论坛 - 打工人之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .back-link { display: inline-block; color: white; text-decoration: none; margin-bottom: 20px; font-size: 1.1em; }
        h1 { color: white; font-size: 2.5em; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: white; opacity: 0.9; margin-bottom: 40px; font-size: 1.2em; }
        .coming-soon { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 60px; text-align: center; color: #333; }
        .coming-soon h2 { font-size: 2em; margin-bottom: 20px; color: #667eea; }
        .coming-soon p { color: #666; font-size: 1.2em; line-height: 1.8; margin-bottom: 30px; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .feature { background: rgba(102,126,234,0.1); padding: 25px; border-radius: 15px; }
        .feature-icon { font-size: 3em; margin-bottom: 15px; }
        .feature-title { font-weight: bold; margin-bottom: 10px; color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回首页</a>
        <h1>☕ 吐槽社区</h1>
        <p class="subtitle">打工人的树洞</p>
        <div class="coming-soon">
            <h2>🚧 社区开发中</h2>
            <p>正在打造一个属于打工人的交流社区<br>期待你的加入！</p>
            <div class="features">
                <div class="feature"><div class="feature-icon">💬</div><div class="feature-title">自由吐槽</div><div>工作、生活、情感，想说就说</div></div>
                <div class="feature"><div class="feature-icon">🤝</div><div class="feature-title">互助答疑</div><div>有问题大家一起帮</div></div>
                <div class="feature"><div class="feature-icon">📊</div><div class="feature-title">投票调研</div><div>参与话题讨论，表达你的观点</div></div>
                <div class="feature"><div class="feature-icon">🏆</div><div class="feature-title">积分系统</div><div>发帖互动赚积分，兑换奖品</div></div>
            </div>
        </div>
    </div>
</body>
</html>
