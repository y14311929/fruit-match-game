<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大作战 - 打工人之家</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0,255,127,0.5);
        }
        
        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .game-info div {
            background: rgba(255,255,255,0.1);
            padding: 10px 25px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        
        #gameCanvas {
            border: 3px solid #00ff7f;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,255,127,0.3);
            background: rgba(0,0,0,0.5);
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        #startBtn {
            background: linear-gradient(135deg, #00ff7f 0%, #00cc66 100%);
            color: #1a1a2e;
        }
        
        #pauseBtn {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #1a1a2e;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,255,127,0.4);
        }
        
        .mobile-controls {
            display: none;
            margin-top: 20px;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
        }
        
        .mobile-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }
        
        .mobile-btn:active {
            background: rgba(255,255,255,0.3);
        }
        
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ff4444;
            display: none;
            z-index: 1000;
        }
        
        .game-over.show {
            display: block;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
        
        .game-over h2 {
            font-size: 2.5em;
            color: #ff4444;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        
        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
            }
            
            #gameCanvas {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇大作战</h1>
    
    <div class="game-info">
        <div>🏆 分数：<span id="score">0</span></div>
        <div>👑 最高分：<span id="highScore">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="controls">
        <button id="startBtn" onclick="startGame()">🎮 开始游戏</button>
        <button id="pauseBtn" onclick="pauseGame()">⏸️ 暂停</button>
    </div>
    
    <div class="mobile-controls">
        <button class="mobile-btn up" onclick="changeDirection('up')">⬆️</button>
        <button class="mobile-btn left" onclick="changeDirection('left')">⬅️</button>
        <button class="mobile-btn down" onclick="changeDirection('down')">⬇️</button>
        <button class="mobile-btn right" onclick="changeDirection('right')">➡️</button>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>😵 游戏结束</h2>
        <p>最终得分：<span id="finalScore">0</span></p>
        <button onclick="startGame()" style="background: linear-gradient(135deg, #00ff7f 0%, #00cc66 100%); color: #1a1a2e;">🔄 再来一局</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let isRunning = false;
        let isPaused = false;
        let speed = 150;
        
        document.getElementById('highScore').textContent = highScore;
        
        function initGame() {
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            document.getElementById('score').textContent = score;
            placeFood();
        }
        
        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // 确保食物不在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood();
                    break;
                }
            }
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 画食物
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 画蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    0,
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    gridSize/2
                );
                
                if (index === 0) {
                    // 蛇头
                    gradient.addColorStop(0, '#00ff7f');
                    gradient.addColorStop(1, '#00cc66');
                } else {
                    // 蛇身
                    gradient.addColorStop(0, '#00cc66');
                    gradient.addColorStop(1, '#009944');
                }
                
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                // 画蛇眼睛
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    const eyeSize = 4;
                    const eyeOffset = 5;
                    
                    if (direction === 'right') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'left') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'up') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'down') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
        }
        
        function update() {
            direction = nextDirection;
            
            const head = {x: snake[0].x, y: snake[0].y};
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // 撞自己检测
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
                
                // 加速
                if (speed > 50 && score % 50 === 0) {
                    speed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }
        }
        
        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }
        
        function startGame() {
            if (isRunning) {
                clearInterval(gameLoop);
            }
            
            initGame();
            isRunning = true;
            isPaused = false;
            speed = 150;
            gameLoop = setInterval(update, speed);
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('startBtn').textContent = '🔄 重新开始';
        }
        
        function pauseGame() {
            if (!isRunning) return;
            
            if (isPaused) {
                gameLoop = setInterval(update, speed);
                document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
            } else {
                clearInterval(gameLoop);
                document.getElementById('pauseBtn').textContent = '▶️ 继续';
            }
            isPaused = !isPaused;
        }
        
        function changeDirection(newDir) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[newDir] !== direction) {
                nextDirection = newDir;
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection('right');
                    break;
                case ' ':
                    pauseGame();
                    break;
            }
        });
        
        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
