            4: { badge: '🔥 热门', title: '多地发布高温津贴标准，6-9 月可领这笔钱', source: '📰 工人日报', time: '🕐 12 小时前', views: '👁 5.2w 阅读', cover: 'https://picsum.photos/seed/d4c/1200/500', content: '<p><strong>【本报讯】</strong> 随着夏季来临，多地发布高温津贴发放标准。</p><div class="article-image"><img src="https://picsum.photos/seed/d4i1/800/400"><div class="image-caption">高温津贴发放标准公布</div></div><h2>📋 发放标准</h2><p>北京、上海、广东等地高温津贴标准分别为每月 180 元、300 元、300 元。</p><div class="article-image"><img src="https://picsum.photos/seed/d4i2/800/400"><div class="image-caption">各地高温津贴标准对比</div></div><h2>⏰ 发放时间</h2><p>大部分地区高温津贴发放时间为 6-9 月，共 4 个月。</p><div class="article-image"><img src="https://picsum.photos/seed/d4i3/800/400"><div class="image-caption">高温津贴发放时间</div></div><h2>⚠️ 维权提示</h2><p>劳动者如未收到高温津贴，可向当地劳动监察部门投诉举报。</p><div class="article-image"><img src="https://picsum.photos/seed/d4i4/800/400"><div class="image-caption">劳动者维权渠道</div></div>', tags: ['#高温津贴', '#劳动权益', '#夏季福利', '#6-9 月'], related: [1, 2, 5] },

            7: { badge: '🆕 最新', title: '多地试点灵活就业人员职业伤害保障', source: '📰 人民日报', time: '🕐 2 天前', views: '👁 2.9w 阅读', cover: 'https://picsum.photos/seed/d7c/1200/500', content: '<p><strong>【本报讯】</strong> 北京、上海、江苏等地开展新就业形态就业人员职业伤害保障试点。</p><div class="article-image"><img src="https://picsum.photos/seed/d7i1/800/400"><div class="image-caption">职业伤害保障试点启动</div></div><h2>📋 试点范围</h2><p>试点覆盖外卖骑手、网约车司机、快递员等新就业形态从业人员。</p><div class="article-image"><img src="https://picsum.photos/seed/d7i2/800/400"><div class="image-caption">外卖骑手纳入保障范围</div></div><h2>💰 缴费方式</h2><p>平台企业按规定缴费，从业人员个人不缴费。</p><div class="article-image"><img src="https://picsum.photos/seed/d7i3/800/400"><div class="image-caption">平台企业缴费</div></div><h2>🎯 保障待遇</h2><p>包括医疗救治、经济补偿、职业康复等。</p><div class="article-image"><img src="https://picsum.photos/seed/d7i4/800/400"><div class="image-caption">职业伤害保障待遇</div></div>', tags: ['#职业伤害', '#灵活就业', '#社保试点', '#新就业形态'], related: [2, 4, 6] },
            8: { badge: '🔥 热门', title: '2026 年养老金实现"22 连涨"，涨幅 3.5%', source: '📰 央视新闻', time: '🕐 3 天前', views: '👁 9.1w 阅读', cover: 'https://picsum.photos/seed/d8c/1200/500', content: '<p><strong>【本报讯】</strong> 人社部和财政部联合发布通知，2026 年退休人员基本养老金上调 3.5%。</p><div class="article-image"><img src="https://picsum.photos/seed/d8i1/800/400"><div class="image-caption">养老金实现 22 连涨</div></div><h2>📊 调整范围</h2><p>此次调整覆盖全国 1.4 亿退休人员，人均月增加约 150 元。</p><div class="article-image"><img src="https://picsum.photos/seed/d8i2/800/400"><div class="image-caption">养老金调整范围</div></div><h2>💡 调整方式</h2><p>采取定额调整、挂钩调整和适当倾斜相结合的方式。</p><div class="article-image"><img src="https://picsum.photos/seed/d8i3/800/400"><div class="image-caption">养老金调整方式</div></div><h2>🎯 发放时间</h2><p>各地将于 7 月底前将增加的养老金发放到位。</p><div class="article-image"><img src="https://picsum.photos/seed/d8i4/800/400"><div class="image-caption">养老金发放时间</div></div>', tags: ['#养老金', '#22 连涨', '#退休人员', '#社保'], related: [1, 5, 7] }
        };
        const newsList = [
            { id: 1, title: '2026 年多地调整最低工资标准', image: 'https://picsum.photos/seed/r1/400/180', source: '人社部官网', time: '2 小时前' },
            { id: 2, title: '九部门发文：保障新就业形态劳动者权益', image: 'https://picsum.photos/seed/r2/400/180', source: '新华网', time: '5 小时前' },
            { id: 3, title: '2026 届高校毕业生规模预计达 1187 万人', image: 'https://picsum.photos/seed/r3/400/180', source: '教育部', time: '8 小时前' },
            { id: 4, title: '多地发布高温津贴标准', image: 'https://picsum.photos/seed/r4/400/180', source: '工人日报', time: '12 小时前' },

        ];
        function loadNews() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id') || '1');
            const news = newsData[id];
            if (!news) { document.body.innerHTML = '<div style="text-align:center;padding:100px;"><h1>新闻不存在</h1><a href="/news/" style="color:#667eea;">返回新闻列表</a></div>'; return; }
            document.getElementById('coverImage').src = news.cover;

        }
