<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻详情 - 打工人之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link { display: inline-block; color: #667eea; text-decoration: none; margin-bottom: 20px; font-size: 1.1em; font-weight: 600; }
        .article { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .article-cover { width: 100%; height: 500px; object-fit: cover; }
        .article-body { padding: 50px; }
        .article-badge { display: inline-block; padding: 8px 20px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border-radius: 25px; font-size: 0.9em; font-weight: 600; margin-bottom: 20px; }
        .article-title { font-size: 2.5em; font-weight: bold; color: #333; margin-bottom: 20px; line-height: 1.3; }
        .article-meta { display: flex; gap: 30px; color: #999; font-size: 0.95em; margin-bottom: 30px; padding-bottom: 30px; border-bottom: 2px solid #f0f0f0; }
        .article-meta span { display: flex; align-items: center; gap: 8px; }
        .article-content { line-height: 2; color: #444; font-size: 1.05em; }
        .article-content p { margin-bottom: 25px; }
        .article-content h2 { font-size: 1.8em; color: #333; margin: 40px 0 20px 0; }
        .article-image { width: 100%; margin: 30px 0; border-radius: 15px; overflow: hidden; }
        .article-image img { width: 100%; height: auto; }
        .image-caption { text-align: center; color: #999; font-size: 0.9em; padding: 15px; background: #f9f9f9; }
        .article-tags { display: flex; gap: 10px; flex-wrap: wrap; margin: 40px 0; padding-top: 30px; border-top: 2px solid #f0f0f0; }
        .tag { padding: 8px 20px; background: rgba(102,126,234,0.1); color: #667eea; border-radius: 25px; font-size: 0.9em; font-weight: 600; }
        .related-news { margin-top: 50px; padding-top: 50px; border-top: 2px solid #f0f0f0; }
        .related-news h3 { font-size: 1.8em; color: #333; margin-bottom: 25px; }
        .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .related-card { background: #f9f9f9; border-radius: 15px; overflow: hidden; transition: all 0.3s; cursor: pointer; }
        .related-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .related-image { width: 100%; height: 180px; object-fit: cover; }
        .related-body { padding: 20px; }
        .related-title { font-size: 1.1em; font-weight: bold; color: #333; margin-bottom: 10px; line-height: 1.4; }
        .related-meta { color: #999; font-size: 0.85em; }
        @media (max-width: 768px) { .article-body { padding: 25px; } .article-cover { height: 300px; } .article-title { font-size: 1.8em; } .related-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="/news/" class="back-link">← 返回新闻列表</a>
        
        <article class="article">
            <img id="coverImage" src="" alt="新闻封面" class="article-cover">
            
            <div class="article-body">
                <span id="badge" class="article-badge"></span>
                <h1 id="title" class="article-title"></h1>
                
                <div class="article-meta">
                    <span id="source"></span>
                    <span id="time"></span>
                    <span id="views"></span>
                </div>
                
                <div id="content" class="article-content"></div>
                
                <div class="article-tags" id="tags"></div>
            </div>
        </article>
        
        <div class="related-news">
            <h3>📰 相关新闻</h3>
            <div class="related-grid" id="relatedGrid"></div>
        </div>
    </div>
    
    <script>

                `,

                related: [2, 3, 4]
            },
            2: {

                source: '📰 新华网',
                time: '🕐 5 小时前',

                cover: 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=1200&h=500&fit=crop',
                content: `
                    <p><strong>【本报讯】</strong> 人社部等九部门联合发布指导意见，明确平台企业用工责任，完善社保政策，优化职业发展环境。外卖骑手、网约车司机等群体将受益。</p>
                    
                    <div class="article-image">
                        <img src="https://images.unsplash.com/photo-1616401784845-180886ba9ca2?w=800&h=400&fit=crop" alt="外卖骑手">

                    </div>

                    <div class="article-image">
                        <img src="https://images.unsplash.com/photo-1556740738-b6a63e27c4df?w=800&h=400&fit=crop" alt="合同签订">

                    <p>政策要求，平台企业应当为新就业形态劳动者参加社会保险提供便利。鼓励有条件的地区开展职业伤害保障试点，解决劳动者后顾之忧。</p>
                    
                    <div class="article-image">
                        <img src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=800&h=400&fit=crop" alt="社保办理">
                        <div class="image-caption">社保政策将更加完善</div>
                    </div>
                `,
                tags: ['#新就业形态', '#劳动权益', '#平台经济', '#社保政策'],
                related: [1, 5, 7]
            },
            3: {
                badge: '🆕 最新',
                title: '2026 届高校毕业生规模预计达 1187 万人',
                source: '📰 教育部',
                time: '🕐 8 小时前',
                views: '👁 6.7w 阅读',
                cover: 'https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1200&h=500&fit=crop',
                content: `
                    <p><strong>【本报讯】</strong> 教育部数据显示，2026 届全国普通高校毕业生规模预计 1187 万人，同比增加 23 万人。各地出台多项政策促进高校毕业生就业创业。</p>
                    
                    <div class="article-image">
                        <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=800&h=400&fit=crop" alt="高校毕业生">
                        <div class="image-caption">2026 届高校毕业生规模创新高</div>
                    </div>
                    
                    <h2>📊 就业形势</h2>
                    <p>教育部高校学生司司长表示，2026 届高校毕业生规模预计达到 1187 万人，同比增加 23 万人，就业形势依然严峻复杂。</p>
                    
                    <div class="article-image">
                        <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=800&h=400&fit=crop" alt="就业数据">

                    <h2>🎯 政策措施</h2>
                    <p>各地纷纷出台政策措施，包括扩大国企招聘规模、增加基层岗位、鼓励创业等，全力促进高校毕业生就业创业。</p>
                    
                    <div class="article-image">
                        <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=800&h=400&fit=crop" alt="招聘会">
                        <div class="image-caption">各地举办专场招聘会</div>
                    </div>
                `,
                tags: ['#高校毕业生', '#就业', '#2026 届', '#政策措施'],
                related: [1, 4, 6]
            }
        };
        
        const newsList = [
            { id: 1, title: '2026 年多地调整最低工资标准', image: 'https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=400&h=180&fit=crop', source: '人社部官网', time: '2 小时前' },
            { id: 2, title: '九部门发文：保障新就业形态劳动者权益', image: 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=400&h=180&fit=crop', source: '新华网', time: '5 小时前' },
            { id: 3, title: '2026 届高校毕业生规模预计达 1187 万人', image: 'https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=400&h=180&fit=crop', source: '教育部', time: '8 小时前' },
            { id: 4, title: '多地发布高温津贴标准', image: 'https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=400&h=180&fit=crop', source: '工人日报', time: '12 小时前' }
        ];
        
        function loadNews() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id') || '1');
            const news = newsData[id];
            
            if (!news) {
                document.body.innerHTML = '<div style="text-align:center;padding:100px;"><h1>新闻不存在</h1><a href="/news/" style="color:#667eea;">返回新闻列表</a></div>';
                return;
            }
            
            document.getElementById('coverImage').src = news.cover;
            document.getElementById('badge').textContent = news.badge;
            document.getElementById('title').textContent = news.title;
            document.getElementById('source').textContent = news.source;
            document.getElementById('time').textContent = news.time;
            document.getElementById('views').textContent = news.views;
            document.getElementById('content').innerHTML = news.content;
            document.getElementById('tags').innerHTML = news.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            
            const relatedGrid = document.getElementById('relatedGrid');
            relatedGrid.innerHTML = news.related.map(relId => {
                const rel = newsList.find(n => n.id === relId) || newsList[0];
                return `
                    <div class="related-card" onclick="location.href='/news/detail.html?id=${relId}'">
                        <img src="${rel.image}" alt="${rel.title}" class="related-image">
                        <div class="related-body">
                            <h4 class="related-title">${rel.title}</h4>
                            <div class="related-meta">${rel.source} · ${rel.time}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        loadNews();
    </script>
</body>
</html>
