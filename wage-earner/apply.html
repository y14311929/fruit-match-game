<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投递简历 - 打工人之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .back-link { display: inline-block; color: white; text-decoration: none; margin-bottom: 20px; font-size: 1.1em; }
        .card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #333; font-size: 2.5em; margin-bottom: 10px; text-align: center; }
        .job-info { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; padding: 25px; border-radius: 15px; margin-bottom: 35px; text-align: center; }
        .job-info h2 { font-size: 1.8em; margin-bottom: 10px; }
        .job-info p { opacity: 0.95; font-size: 1.1em; }
        .form-group { margin-bottom: 25px; }
        label { display: block; color: #333; font-weight: 600; margin-bottom: 8px; font-size: 1.05em; }
        input, select, textarea { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; font-family: inherit; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { min-height: 150px; resize: vertical; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; cursor: pointer; transition: transform 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .tip-box { background: #e3f2fd; border-left: 4px solid #2196f3; padding: 20px; border-radius: 10px; margin: 25px 0; }
        .tip-box p { color: #1565c0; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/jobs/" class="back-link">← 返回职位列表</a>
        <div class="card">
            <h1>📮 投递简历</h1>
            <div class="job-info" id="jobInfo">
                <h2 id="jobTitle">职位信息</h2>
                <p id="jobCompany">公司信息</p>
            </div>
            
            <form onsubmit="submitResume(event)">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" required placeholder="请输入您的姓名">
                </div>
                
                <div class="form-group">
                    <label>手机号 *</label>
                    <input type="tel" required placeholder="请输入您的手机号">
                </div>
                
                <div class="form-group">
                    <label>邮箱 *</label>
                    <input type="email" required placeholder="请输入您的邮箱">
                </div>
                
                <div class="form-group">
                    <label>工作年限</label>
                    <select>
                        <option value="">请选择</option>
                        <option value="0-1">应届生/无经验</option>
                        <option value="1-3">1-3 年</option>
                        <option value="3-5">3-5 年</option>
                        <option value="5-10">5-10 年</option>
                        <option value="10+">10 年以上</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>学历</label>
                    <select>
                        <option value="">请选择</option>
                        <option value="high-school">高中/中专</option>
                        <option value="college">大专</option>
                        <option value="bachelor">本科</option>
                        <option value="master">硕士</option>
                        <option value="phd">博士</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>自我介绍 *</label>
                    <textarea required placeholder="请简单介绍您的工作经历、技能特长等（300 字以内）"></textarea>
                </div>
                
                <div class="form-group">
                    <label>附件简历（选填）</label>
                    <input type="file" accept=".pdf,.doc,.docx">
                </div>
                
                <button type="submit" class="btn">📤 提交简历</button>
            </form>
            
            <div class="tip-box">
                <p>💡 <strong>温馨提示：</strong> 提交后 HR 会在 3 个工作日内联系您，请保持电话畅通。如有问题请联系 support@wage-earner.com</p>
            </div>
        </div>
    </div>
    
    <script>
        const jobData = JSON.parse(localStorage.getItem('applyJob') || '{}');
        if (jobData.title) {
            document.getElementById('jobTitle').textContent = jobData.title;
            document.getElementById('jobCompany').textContent = jobData.company;
        }
        
        function submitResume(e) {
            e.preventDefault();
            alert('🎉 简历提交成功！\n\n您的简历已发送给 HR，会在 3 个工作日内联系您。\n\n请保持电话畅通，祝求职顺利！');
            localStorage.removeItem('applyJob');
            location.href = '/jobs/';
        }
    </script>
</body>
</html>
