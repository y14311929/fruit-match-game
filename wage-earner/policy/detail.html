<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策详情 - 打工人之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link { display: inline-block; color: #667eea; text-decoration: none; margin-bottom: 20px; font-size: 1.1em; font-weight: 600; }
        .article { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .article-cover { width: 100%; height: 500px; object-fit: cover; }
        .article-body { padding: 50px; }
        .article-badge { display: inline-block; padding: 8px 20px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border-radius: 25px; font-size: 0.9em; font-weight: 600; margin-bottom: 20px; }
        .article-title { font-size: 2.5em; font-weight: bold; color: #333; margin-bottom: 20px; line-height: 1.3; }
        .article-meta { display: flex; gap: 30px; color: #999; font-size: 0.95em; margin-bottom: 30px; padding-bottom: 30px; border-bottom: 2px solid #f0f0f0; }
        .article-meta span { display: flex; align-items: center; gap: 8px; }
        .article-content { line-height: 2; color: #444; font-size: 1.05em; }
        .article-content p { margin-bottom: 25px; }
        .article-content h2 { font-size: 1.8em; color: #333; margin: 40px 0 20px 0; }
        .article-image { width: 100%; margin: 30px 0; border-radius: 15px; overflow: hidden; }
        .article-image img { width: 100%; height: auto; min-height: 300px; object-fit: cover; }
        .image-caption { text-align: center; color: #999; font-size: 0.9em; padding: 15px; background: #f9f9f9; }
        .article-tags { display: flex; gap: 10px; flex-wrap: wrap; margin: 40px 0; padding-top: 30px; border-top: 2px solid #f0f0f0; }
        .tag { padding: 8px 20px; background: rgba(102,126,234,0.1); color: #667eea; border-radius: 25px; font-size: 0.9em; font-weight: 600; }
        .related-news { margin-top: 50px; padding-top: 50px; border-top: 2px solid #f0f0f0; }
        .related-news h3 { font-size: 1.8em; color: #333; margin-bottom: 25px; }
        .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .related-card { background: #f9f9f9; border-radius: 15px; overflow: hidden; transition: all 0.3s; cursor: pointer; }
        .related-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .related-image { width: 100%; height: 180px; object-fit: cover; }
        .related-body { padding: 20px; }
        .related-title { font-size: 1.1em; font-weight: bold; color: #333; margin-bottom: 10px; line-height: 1.4; }
        .related-meta { color: #999; font-size: 0.85em; }
        @media (max-width: 768px) { .article-body { padding: 25px; } .article-cover { height: 300px; } .article-title { font-size: 1.8em; } .related-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="/policy/" class="back-link">← 返回政策列表</a>
        <article class="article">
            <img id="coverImage" src="" alt="政策封面" class="article-cover">
            <div class="article-body">
                <span id="badge" class="article-badge"></span>
                <h1 id="title" class="article-title"></h1>
                <div class="article-meta">
                    <span id="source"></span>
                    <span id="time"></span>
                </div>
                <div id="content" class="article-content"></div>
                <div class="article-tags" id="tags"></div>
            </div>
        </article>
        <div class="related-news">
            <h3>📜 相关政策</h3>
            <div class="related-grid" id="relatedGrid"></div>
        </div>
    </div>
    <script>
        const policyData = {
            1: { badge: '🆕 最新', title: '住房公积金缴存比例调整，5%-12% 可自主选择', source: '📰 上海公积金中心', time: '🕐 1 天前', cover: 'https://picsum.photos/seed/policy1c/1200/500', content: '<p><strong>【本报讯】</strong> 上海市公积金管理中心发布最新通知，调整住房公积金缴存比例。</p><div class="article-image"><img src="https://picsum.photos/seed/p1i1/800/400"><div class="image-caption">住房公积金缴存比例调整</div></div><h2>📋 调整内容</h2><p>单位和职工住房公积金缴存比例下限均为 5%，上限为 12%。单位可在 5%-12% 区间内自主确定缴存比例。</p><div class="article-image"><img src="https://picsum.photos/seed/p1i2/800/400"><div class="image-caption">缴存比例区间</div></div><h2>💰 困难企业政策</h2><p>生产经营困难的企业，可申请降低住房公积金缴存比例或缓缴，经本单位职工代表大会或工会讨论通过后实施。</p><div class="article-image"><img src="https://picsum.photos/seed/p1i3/800/400"><div class="image-caption">困难企业可申请降低</div></div><h2>📈 影响分析</h2><p>此次调整将进一步减轻企业负担，提高企业自主权，有利于优化营商环境。</p><div class="article-image"><img src="https://picsum.photos/seed/p1i4/800/400"><div class="image-caption">优化营商环境</div></div>', tags: ['#公积金', '#缴存比例', '#上海政策', '#企业减负'], related: [2, 3, 5] },
            2: { badge: '🔥 热门', title: '最低工资标准调整，一类地区每月 2360 元', source: '📰 北京市人社局', time: '🕐 3 天前', cover: 'https://picsum.photos/seed/policy2c/1200/500', content: '<p><strong>【本报讯】</strong> 北京市人力资源和社会保障局发布最低工资标准调整通知。</p><div class="article-image"><img src="https://picsum.photos/seed/p2i1/800/400"><div class="image-caption">最低工资标准调整</div></div><h2>📊 调整标准</h2><p>自 2026 年 1 月 1 日起，一类地区月最低工资标准调整为 2360 元，二类地区调整为 2100 元。</p><div class="article-image"><img src="https://picsum.photos/seed/p2i2/800/400"><div class="image-caption">最低工资标准对比</div></div><h2>💡 适用范围</h2><p>适用于北京市行政区域内的企业、民办非企业单位、有雇工的个体工商户等用人单位。</p><div class="article-image"><img src="https://picsum.photos/seed/p2i3/800/400"><div class="image-caption">适用范围</div></div><h2>📈 调整意义</h2><p>此次调整有利于保障低收入劳动者基本生活，促进社会公平正义。</p><div class="article-image"><img src="https://picsum.photos/seed/p2i4/800/400"><div class="image-caption">保障劳动者权益</div></div>', tags: ['#最低工资', '#薪资标准', '#北京政策', '#劳动者权益'], related: [1, 4, 6] },
            3: { badge: '⚠️ 重要', title: '带薪年休假实施办法，未休年假可获 3 倍工资', source: '📰 人社部', time: '🕐 5 天前', cover: 'https://picsum.photos/seed/policy3c/1200/500', content: '<p><strong>【本报讯】</strong> 人社部发布带薪年休假实施办法。</p><div class="article-image"><img src="https://picsum.photos/seed/p3i1/800/400"><div class="image-caption">带薪年休假实施办法</div></div><h2>📋 休假天数</h2><p>职工累计工作已满 1 年不满 10 年的，年休假 5 天；已满 10 年不满 20 年的，年休假 10 天；已满 20 年的，年休假 15 天。</p><div class="article-image"><img src="https://picsum.photos/seed/p3i2/800/400"><div class="image-caption">年休假天数标准</div></div><h2>💰 未休补偿</h2><p>单位确因工作需要不能安排休年休假的，应按照日工资收入的 300% 支付年休假工资报酬。</p><div class="article-image"><img src="https://picsum.photos/seed/p3i3/800/400"><div class="image-caption">未休年假 3 倍工资</div></div><h2>⚠️ 注意事项</h2><p>职工已享受寒暑假、事假累计 20 天以上等情形的，不享受当年年休假。</p><div class="article-image"><img src="https://picsum.photos/seed/p3i4/800/400"><div class="image-caption">年休假注意事项</div></div>', tags: ['#年休假', '#带薪休假', '#3 倍工资', '#劳动者权益'], related: [1, 2, 7] },
            4: { badge: '🆕 最新', title: '高温津贴标准发布，6-9 月每月 180-300 元', source: '📰 工人日报', time: '🕐 1 周前', cover: 'https://picsum.photos/seed/policy4c/1200/500', content: '<p><strong>【本报讯】</strong> 多地发布高温津贴发放标准。</p><div class="article-image"><img src="https://picsum.photos/seed/p4i1/800/400"><div class="image-caption">高温津贴标准发布</div></div><h2>📋 发放标准</h2><p>北京、上海、广东等地高温津贴标准分别为每月 180 元、300 元、300 元。</p><div class="article-image"><img src="https://picsum.photos/seed/p4i2/800/400"><div class="image-caption">各地高温津贴标准</div></div><h2>⏰ 发放时间</h2><p>大部分地区高温津贴发放时间为 6-9 月，共 4 个月。</p><div class="article-image"><img src="https://picsum.photos/seed/p4i3/800/400"><div class="image-caption">发放时间 6-9 月</div></div><h2>⚠️ 维权提示</h2><p>劳动者如未收到高温津贴，可向当地劳动监察部门投诉举报。</p><div class="article-image"><img src="https://picsum.photos/seed/p4i4/800/400"><div class="image-caption">维权渠道</div></div>', tags: ['#高温津贴', '#夏季福利', '#劳动权益', '#6-9 月'], related: [2, 5, 6] },
            5: { badge: '🔥 热门', title: '社保缴费基数调整，上下限同步提高', source: '📰 人社部', time: '🕐 1 周前', cover: 'https://picsum.photos/seed/policy5c/1200/500', content: '<p><strong>【本报讯】</strong> 多地发布社保缴费基数上下限标准。</p><div class="article-image"><img src="https://picsum.photos/seed/p5i1/800/400"><div class="image-caption">社保缴费基数调整</div></div><h2>📊 调整标准</h2><p>社保缴费基数上限为上年度全口径城镇单位就业人员月平均工资的 300%，下限为 60%。</p><div class="article-image"><img src="https://picsum.photos/seed/p5i2/800/400"><div class="image-caption">缴费基数上下限</div></div><h2>💡 注意事项</h2><p>工资低于下限的按下限缴纳，高于上限的按上限缴纳。</p><div class="article-image"><img src="https://picsum.photos/seed/p5i3/800/400"><div class="image-caption">缴费基数注意事项</div></div><h2>📈 影响分析</h2><p>缴费基数调整将影响职工社保待遇水平，缴费基数越高，退休后养老金越高。</p><div class="article-image"><img src="https://picsum.photos/seed/p5i4/800/400"><div class="image-caption">影响社保待遇</div></div>', tags: ['#社保', '#缴费基数', '#上下限', '#养老金'], related: [1, 3, 8] },
            6: { badge: '⚠️ 重要', title: '劳动合同法实施条例，这些情况需支付补偿金', source: '📰 人社部', time: '🕐 2 周前', cover: 'https://picsum.photos/seed/policy6c/1200/500', content: '<p><strong>【本报讯】</strong> 劳动合同法实施条例明确经济补偿金支付情形。</p><div class="article-image"><img src="https://picsum.photos/seed/p6i1/800/400"><div class="image-caption">劳动合同法实施条例</div></div><h2>📋 支付情形</h2><p>用人单位提出解除劳动合同并与劳动者协商一致、劳动者患病或非因工负伤医疗期满不能从事原工作等情形，需支付经济补偿金。</p><div class="article-image"><img src="https://picsum.photos/seed/p6i2/800/400"><div class="image-caption">补偿金支付情形</div></div><h2>💰 计算标准</h2><p>经济补偿按劳动者在本单位工作的年限，每满一年支付一个月工资的标准向劳动者支付。</p><div class="article-image"><img src="https://picsum.photos/seed/p6i3/800/400"><div class="image-caption">补偿金计算标准</div></div><h2>⚠️ 注意事项</h2><p>月工资高于本地区上年度职工月平均工资三倍的，按三倍数额支付，最高不超过十二年。</p><div class="article-image"><img src="https://picsum.photos/seed/p6i4/800/400"><div class="image-caption">补偿金上限</div></div>', tags: ['#劳动合同', '#经济补偿金', '#解除劳动合同', '#劳动者权益'], related: [2, 3, 7] },
            7: { badge: '🆕 最新', title: '女职工劳动保护特别规定，产假 98 天', source: '📰 国务院', time: '🕐 2 周前', cover: 'https://picsum.photos/seed/policy7c/1200/500', content: '<p><strong>【本报讯】</strong> 女职工劳动保护特别规定明确产假天数。</p><div class="article-image"><img src="https://picsum.photos/seed/p7i1/800/400"><div class="image-caption">女职工劳动保护规定</div></div><h2>📋 产假天数</h2><p>女职工生育享受 98 天产假，其中产前可以休假 15 天；难产的，增加产假 15 天；生育多胞胎的，每多生育 1 个婴儿，增加产假 15 天。</p><div class="article-image"><img src="https://picsum.photos/seed/p7i2/800/400"><div class="image-caption">产假天数标准</div></div><h2>💰 产假待遇</h2><p>女职工产假期间的生育津贴，对已经参加生育保险的，按照用人单位上年度职工月平均工资的标准由生育保险基金支付。</p><div class="article-image"><img src="https://picsum.photos/seed/p7i3/800/400"><div class="image-caption">产假待遇</div></div><h2>⚠️ 劳动保护</h2><p>用人单位不得因女职工怀孕、生育、哺乳降低其工资、予以辞退、与其解除劳动或者聘用合同。</p><div class="article-image"><img src="https://picsum.photos/seed/p7i4/800/400"><div class="image-caption">女职工劳动保护</div></div>', tags: ['#女职工', '#产假', '#生育津贴', '#劳动保护'], related: [3, 6, 8] },
            8: { badge: '🔥 热门', title: '个人所得税专项附加扣除标准提高', source: '📰 税务总局', time: '🕐 3 周前', cover: 'https://picsum.photos/seed/policy8c/1200/500', content: '<p><strong>【本报讯】</strong> 个人所得税专项附加扣除标准提高。</p><div class="article-image"><img src="https://picsum.photos/seed/p8i1/800/400"><div class="image-caption">个税专项附加扣除</div></div><h2>📋 扣除标准</h2><p>3 岁以下婴幼儿照护、子女教育、赡养老人等专项附加扣除标准提高，减轻纳税人负担。</p><div class="article-image"><img src="https://picsum.photos/seed/p8i2/800/400"><div class="image-caption">扣除标准提高</div></div><h2>💡 扣除项目</h2><p>专项附加扣除包括子女教育、继续教育、大病医疗、住房贷款利息、住房租金、赡养老人、3 岁以下婴幼儿照护等 7 项。</p><div class="article-image"><img src="https://picsum.photos/seed/p8i3/800/400"><div class="image-caption">7 项专项附加扣除</div></div><h2>📈 影响分析</h2><p>扣除标准提高后，纳税人可享受更多税收优惠，减轻税负。</p><div class="article-image"><img src="https://picsum.photos/seed/p8i4/800/400"><div class="image-caption">减轻税负</div></div>', tags: ['#个人所得税', '#专项附加扣除', '#税收优惠', '#减负'], related: [1, 5, 7] }
        };
        const policyList = [
            { id: 1, title: '住房公积金缴存比例调整', image: 'https://picsum.photos/seed/policy1/400/180', source: '上海公积金中心', time: '1 天前' },
            { id: 2, title: '最低工资标准调整', image: 'https://picsum.photos/seed/policy2/400/180', source: '北京市人社局', time: '3 天前' },
            { id: 3, title: '带薪年休假实施办法', image: 'https://picsum.photos/seed/policy3/400/180', source: '人社部', time: '5 天前' },
            { id: 4, title: '高温津贴标准发布', image: 'https://picsum.photos/seed/policy4/400/180', source: '工人日报', time: '1 周前' },
            { id: 5, title: '社保缴费基数调整', image: 'https://picsum.photos/seed/policy5/400/180', source: '人社部', time: '1 周前' },
            { id: 6, title: '劳动合同法实施条例', image: 'https://picsum.photos/seed/policy6/400/180', source: '人社部', time: '2 周前' },
            { id: 7, title: '女职工劳动保护特别规定', image: 'https://picsum.photos/seed/policy7/400/180', source: '国务院', time: '2 周前' },
            { id: 8, title: '个人所得税专项附加扣除标准提高', image: 'https://picsum.photos/seed/policy8/400/180', source: '税务总局', time: '3 周前' }
        ];
        function loadPolicy() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id') || '1');
            const policy = policyData[id];
            if (!policy) { document.body.innerHTML = '<div style="text-align:center;padding:100px;"><h1>政策不存在</h1><a href="/policy/" style="color:#667eea;">返回政策列表</a></div>'; return; }
            document.getElementById('coverImage').src = policy.cover;
            document.getElementById('badge').textContent = policy.badge;
            document.getElementById('title').textContent = policy.title;
            document.getElementById('source').textContent = policy.source;
            document.getElementById('time').textContent = policy.time;
            document.getElementById('content').innerHTML = policy.content;
            document.getElementById('tags').innerHTML = policy.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            const relatedGrid = document.getElementById('relatedGrid');
            relatedGrid.innerHTML = policy.related.map(relId => { const rel = policyList.find(p => p.id === relId); return `<div class="related-card" onclick="location.href='/policy/detail.html?id=${relId}'"><img src="${rel.image}" alt="${rel.title}" class="related-image"><div class="related-body"><h4 class="related-title">${rel.title}</h4><div class="related-meta">${rel.source} · ${rel.time}</div></div></div>`; }).join('');
        }
        loadPolicy();
    </script>
</body>
</html>
