<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劳务政策 - 打工人之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .back-link { display: inline-block; color: #667eea; text-decoration: none; margin-bottom: 20px; font-size: 1.1em; font-weight: 600; }
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 50px 30px; border-radius: 20px; margin-bottom: 30px; text-align: center; }
        .page-header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .page-header p { font-size: 1.2em; opacity: 0.9; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .news-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.08); transition: all 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .news-image { width: 100%; height: 240px; object-fit: cover; background: #f0f0f0; }
        .news-body { padding: 25px; }
        .news-badge { display: inline-block; padding: 5px 15px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border-radius: 20px; font-size: 0.85em; font-weight: 600; margin-bottom: 12px; }
        .news-title { font-size: 1.3em; font-weight: bold; color: #333; margin-bottom: 12px; line-height: 1.4; }
        .news-summary { color: #666; line-height: 1.8; font-size: 0.95em; margin-bottom: 15px; }
        .news-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #e0e0e0; color: #999; font-size: 0.9em; }
        .news-source { font-weight: 600; color: #667eea; }
        @media (max-width: 768px) { .news-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回首页</a>
        <div class="page-header">
            <h1>📜 劳务政策</h1>
            <p>汇总各地劳务政策，包括薪资福利、社保公积金、休假制度等</p>
        </div>
        <div class="news-grid" id="newsGrid"></div>
    </div>
    <script>
        const newsData = [
            { id: 1, badge: '最新', title: '住房公积金缴存比例调整，5%-12% 可自主选择', summary: '上海最新发布，单位可在区间内自主确定缴存比例，困难企业可申请降低或缓缴。', image: 'https://picsum.photos/seed/policy1/600/400', source: '上海公积金中心', time: '1 天前' },
            { id: 2, badge: '热门', title: '最低工资标准调整，一类地区每月 2360 元', summary: '自 2026 年 1 月 1 日起，调整最低工资标准，北京、上海等地领跑全国。', image: 'https://picsum.photos/seed/policy2/600/400', source: '北京市人社局', time: '3 天前' },
            { id: 3, badge: '重要', title: '带薪年休假实施办法，未休年假可获 3 倍工资', summary: '职工累计工作已满 1 年不满 10 年的，年休假 5 天；已满 10 年不满 20 年的，年休假 10 天。', image: 'https://picsum.photos/seed/policy3/600/400', source: '人社部', time: '5 天前' },
            { id: 4, badge: '最新', title: '高温津贴标准发布，6-9 月每月 180-300 元', summary: '北京、上海、广东等地发布高温津贴标准，用人单位应按规定发放。', image: 'https://picsum.photos/seed/policy4/600/400', source: '工人日报', time: '1 周前' },
            { id: 5, badge: '热门', title: '社保缴费基数调整，上下限同步提高', summary: '多地发布社保缴费基数上下限标准，工资低于下限的按下限缴纳。', image: 'https://picsum.photos/seed/policy5/600/400', source: '人社部', time: '1 周前' },
            { id: 6, badge: '重要', title: '劳动合同法实施条例，这些情况需支付补偿金', summary: '用人单位解除劳动合同，符合法定情形的需支付经济补偿金。', image: 'https://picsum.photos/seed/policy6/600/400', source: '人社部', time: '2 周前' },
            { id: 7, badge: '最新', title: '女职工劳动保护特别规定，产假 98 天', summary: '女职工生育享受 98 天产假，难产的增加 15 天，多胞胎每多一胎增加 15 天。', image: 'https://picsum.photos/seed/policy7/600/400', source: '国务院', time: '2 周前' },
            { id: 8, badge: '热门', title: '个人所得税专项附加扣除标准提高', summary: '3 岁以下婴幼儿照护、子女教育、赡养老人等专项附加扣除标准提高。', image: 'https://picsum.photos/seed/policy8/600/400', source: '税务总局', time: '3 周前' }
        ];
        function renderNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = newsData.map(news => `
                <a href="/policy/detail.html?id=${news.id}" class="news-card">
                    <img src="${news.image}" alt="${news.title}" class="news-image">
                    <div class="news-body">
                        <span class="news-badge">${news.badge}</span>
                        <h3 class="news-title">${news.title}</h3>
                        <p class="news-summary">${news.summary}</p>
                        <div class="news-meta">
                            <span class="news-source">${news.source}</span>
                            <span>${news.time}</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }
        renderNews();
    </script>
</body>
</html>
