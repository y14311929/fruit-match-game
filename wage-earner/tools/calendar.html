<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职场日历 - 打工人之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link { display: inline-block; color: white; text-decoration: none; margin-bottom: 20px; font-size: 1.1em; }
        .card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #333; font-size: 2.5em; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 1.2em; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 15px; color: white; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .calendar-day { background: #f5f5f5; border-radius: 10px; padding: 15px; min-height: 100px; text-align: center; }
        .calendar-day.today { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .calendar-day.weekend { background: #ffe0e0; }
        .day-number { font-size: 1.5em; font-weight: bold; margin-bottom: 10px; }
        .day-events { font-size: 0.85em; line-height: 1.6; }
        .event-tag { display: inline-block; padding: 3px 8px; background: rgba(102,126,234,0.2); border-radius: 5px; margin: 2px; font-size: 0.8em; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 30px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-value { font-size: 2.5em; font-weight: bold; }
        .stat-label { opacity: 0.9; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/tools/" class="back-link">← 返回工具列表</a>
        <div class="card">
            <h1>📅 职场日历</h1>
            <p class="subtitle">工作日、节假日、发薪日一目了然</p>
            <div class="calendar-header">
                <button onclick="prevMonth()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer;">← 上月</button>
                <h2 id="currentMonth" style="font-size: 1.8em;"></h2>
                <button onclick="nextMonth()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer;">下月 →</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="stats">
                <div class="stat-card"><div class="stat-value" id="workDays">0</div><div class="stat-label">工作日</div></div>
                <div class="stat-card"><div class="stat-value" id="weekends">0</div><div class="stat-label">休息日</div></div>
                <div class="stat-card"><div class="stat-value" id="holidays">0</div><div class="stat-label">节假日</div></div>
                <div class="stat-card"><div class="stat-value" id="payDay">15</div><div class="stat-label">发薪日</div></div>
            </div>
        </div>
    </div>
    <script>
        const holidays = {
            '2026-01-01': '元旦', '2026-01-20': '春节', '2026-04-05': '清明',
            '2026-05-01': '劳动节', '2026-06-20': '端午', '2026-09-25': '中秋',
            '2026-10-01': '国庆', '2026-10-02': '国庆', '2026-10-03': '国庆'
        };
        let currentDate = new Date();
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay();
            const totalDays = lastDay.getDate();
            const today = new Date();
            let grid = '';
            let workDays = 0, weekends = 0, holidayCount = 0;
            for (let i = 0; i < startDay; i++) {
                grid += '<div class="calendar-day" style="background: transparent;"></div>';
            }
            for (let day = 1; day <= totalDays; day++) {
                const date = new Date(year, month, day);
                const dayOfWeek = date.getDay();
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = date.toDateString() === today.toDateString();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                const holiday = holidays[dateStr];
                if (isWeekend) weekends++;
                else if (holiday) holidayCount++;
                else workDays++;
                let className = 'calendar-day';
                if (isToday) className += ' today';
                else if (isWeekend) className += ' weekend';
                let events = '';
                if (holiday) events += `<span class="event-tag">${holiday}</span>`;
                if (day === 15) events += `<span class="event-tag">💰 发薪日</span>`;
                grid += `<div class="${className}"><div class="day-number">${day}</div><div class="day-events">${events}</div></div>`;
            }
            document.getElementById('calendarGrid').innerHTML = grid;
            document.getElementById('workDays').textContent = workDays;
            document.getElementById('weekends').textContent = weekends;
            document.getElementById('holidays').textContent = holidayCount;
        }
        function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
        renderCalendar();
    </script>
</body>
</html>
