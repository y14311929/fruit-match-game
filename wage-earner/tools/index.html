<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职场工具 - 打工人之家</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        h1 {
            color: white;
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            text-align: center;
            color: white;
            opacity: 0.9;
            margin-bottom: 40px;
            font-size: 1.2em;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .tool-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 35px;
            color: #333;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            display: block;
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .tool-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }
        
        .tool-title {
            font-size: 1.6em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .tool-desc {
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        
        .tool-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .tag {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .tag-hot {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .tag-new {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .tag-free {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .coming-soon {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .coming-soon:hover {
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回首页</a>
        
        <h1>🛠️ 职场工具箱</h1>
        <p class="subtitle">让工作更高效，早点下班！</p>
        
        <div class="tools-grid">
            <!-- 薪资计算器 -->
            <a href="/tools/salary-calculator.html" class="tool-card">
                <div class="tool-icon">💰</div>
                <div class="tool-title">薪资计算器</div>
                <div class="tool-desc">
                    算算你真正到手多少钱！支持五险一金、个人所得税计算，多个城市可选。
                </div>
                <div class="tool-tags">
                    <span class="tag tag-hot">热门</span>
                    <span class="tag tag-free">免费</span>
                </div>
            </a>
            
            <!-- 下班倒计时 -->
            <a href="/tools/offwork-timer.html" class="tool-card">
                <div class="tool-icon">⏰</div>
                <div class="tool-title">下班倒计时</div>
                <div class="tool-desc">
                    坚持住，马上就自由了！实时显示距离下班还有多久，还有励志语录哦～
                </div>
                <div class="tool-tags">
                    <span class="tag tag-hot">热门</span>
                    <span class="tag tag-free">免费</span>
                </div>
            </a>
            
            <!-- 年假计算器 -->
            <div class="tool-card coming-soon">
                <div class="tool-icon">📅</div>
                <div class="tool-title">年假计算器</div>
                <div class="tool-desc">
                    算算你还有多少年假可以休！根据工龄自动计算法定年假。
                </div>
                <div class="tool-tags">
                    <span class="tag tag-new">开发中</span>
                </div>
            </div>
            
            <!-- 简历模板 -->
            <div class="tool-card coming-soon">
                <div class="tool-icon">📄</div>
                <div class="tool-title">简历模板生成器</div>
                <div class="tool-desc">
                    专业简历模板，在线编辑，一键导出 PDF，助你拿到心仪 Offer！
                </div>
                <div class="tool-tags">
                    <span class="tag tag-new">策划中</span>
                </div>
            </div>
            
            <!-- 加班计算器 -->
            <div class="tool-card coming-soon">
                <div class="tool-icon">🌙</div>
                <div class="tool-title">加班费计算器</div>
                <div class="tool-desc">
                    工作日、周末、节假日加班费分别怎么算？一键计算你的加班报酬。
                </div>
                <div class="tool-tags">
                    <span class="tag tag-new">策划中</span>
                </div>
            </div>
            
            <!-- 社保查询 -->
            <div class="tool-card coming-soon">
                <div class="tool-icon">🏥</div>
                <div class="tool-title">社保公积金查询</div>
                <div class="tool-desc">
                    各地社保公积金缴纳比例查询，了解你的权益。
                </div>
                <div class="tool-tags">
                    <span class="tag tag-new">策划中</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
