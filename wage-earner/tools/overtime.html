<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加班费计算器 - 打工人之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .back-link { display: inline-block; color: white; text-decoration: none; margin-bottom: 20px; font-size: 1.1em; }
        .card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #333; font-size: 2em; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; color: #333; font-weight: 600; margin-bottom: 8px; }
        input, select { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1.1em; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; cursor: pointer; }
        .result { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border-radius: 15px; padding: 30px; margin-top: 30px; display: none; }
        .result.show { display: block; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .result-item { background: rgba(255,255,255,0.2); padding: 20px; border-radius: 10px; text-align: center; }
        .result-label { font-size: 0.95em; opacity: 0.9; margin-bottom: 5px; }
        .result-value { font-size: 2em; font-weight: bold; }
        .tips { background: #fff3cd; border-left: 4px solid #ffc107; padding: 20px; border-radius: 10px; margin-top: 30px; }
        .tips h3 { color: #856404; margin-bottom: 10px; }
        .tips ul { color: #856404; padding-left: 20px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/tools/" class="back-link">← 返回工具列表</a>
        <div class="card">
            <h1>🌙 加班费计算器</h1>
            <p class="subtitle">算算你的加班应该拿多少钱</p>
            <div class="form-group">
                <label>月薪（元）</label>
                <input type="number" id="salary" placeholder="例如：10000" value="10000">
            </div>
            <div class="form-group">
                <label>工作日加班天数</label>
                <input type="number" id="weekdayOvertime" placeholder="平时加班" value="0" min="0">
            </div>
            <div class="form-group">
                <label>周末加班天数</label>
                <input type="number" id="weekendOvertime" placeholder="周六日加班" value="0" min="0">
            </div>
            <div class="form-group">
                <label>法定节假日加班天数</label>
                <input type="number" id="holidayOvertime" placeholder="春节、国庆等" value="0" min="0">
            </div>
            <button class="btn" onclick="calculate()">开始计算</button>
            <div class="result" id="result">
                <div class="result-grid">
                    <div class="result-item"><div class="result-label">工作日加班费</div><div class="result-value" id="weekdayFee">¥0</div></div>
                    <div class="result-item"><div class="result-label">周末加班费</div><div class="result-value" id="weekendFee">¥0</div></div>
                    <div class="result-item"><div class="result-label">节假日加班费</div><div class="result-value" id="holidayFee">¥0</div></div>
                    <div class="result-item"><div class="result-label">加班费总计</div><div class="result-value" id="totalFee">¥0</div></div>
                </div>
            </div>
            <div class="tips">
                <h3>💡 加班费计算标准</h3>
                <ul>
                    <li>工作日加班：时薪 × 150% × 加班小时数（通常按 8 小时/天计算）</li>
                    <li>周末加班：时薪 × 200% × 加班小时数（不能补休的情况下）</li>
                    <li>法定节假日加班：时薪 × 300% × 加班小时数</li>
                    <li>时薪 = 月薪 ÷ 21.75 ÷ 8</li>
                    <li>21.75 是月计薪天数（365 天 -104 天双休）÷ 12 个月</li>
                </ul>
            </div>
        </div>
    </div>
    <script>
        function calculate() {
            const salary = parseFloat(document.getElementById('salary').value) || 0;
            const weekday = parseFloat(document.getElementById('weekdayOvertime').value) || 0;
            const weekend = parseFloat(document.getElementById('weekendOvertime').value) || 0;
            const holiday = parseFloat(document.getElementById('holidayOvertime').value) || 0;
            const hourlyRate = salary / 21.75 / 8;
            const weekdayFee = hourlyRate * 1.5 * 8 * weekday;
            const weekendFee = hourlyRate * 2 * 8 * weekend;
            const holidayFee = hourlyRate * 3 * 8 * holiday;
            const totalFee = weekdayFee + weekendFee + holidayFee;
            document.getElementById('weekdayFee').textContent = '¥' + weekdayFee.toFixed(2);
            document.getElementById('weekendFee').textContent = '¥' + weekendFee.toFixed(2);
            document.getElementById('holidayFee').textContent = '¥' + holidayFee.toFixed(2);
            document.getElementById('totalFee').textContent = '¥' + totalFee.toFixed(2);
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
